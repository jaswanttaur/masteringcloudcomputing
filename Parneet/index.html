<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ABC Technologies</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f6f8fb;
        color: #333;
      }

      header {
        background: #0d6efd;
        color: #fff;
        padding: 24px 32px;
        text-align: center;
      }

      header h1 {
        margin: 0;
        font-size: 2rem;
      }

      main {
        max-width: 900px;
        margin: 32px auto;
        padding: 0 24px 40px;
      }

      .hero,
      .card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 10px 28px rgba(22, 48, 84, 0.08);
        padding: 28px;
        margin-bottom: 24px;
      }

      .hero h2,
      .card h3 {
        margin-top: 0;
      }

      .hero p,
      .card p {
        line-height: 1.7;
        color: #555;
      }

      .info-list {
        list-style: none;
        padding: 0;
        margin: 16px 0 0;
      }

      .info-list li {
        padding: 10px 0;
        border-bottom: 1px solid #eef2f7;
      }

      .info-list li:last-child {
        border-bottom: none;
      }

      footer {
        text-align: center;
        color: #7a7a7a;
        font-size: 0.95rem;
        padding: 20px 0;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>ABC Technologies</h1>
    </header>
    <main>
      <section class="hero">
        <h2>Welcome to ABC Technologies</h2>
      </section>
      <section class="card">
        <h3>Student Details</h3>
        <ul class="info-list">
          <li><strong>Name:</strong> Parneet Kaur</li>
          <li><strong>Roll Number:</strong> 2435114</li>
        </ul>
      </section>
    </main>
    
  </body>
</html>
